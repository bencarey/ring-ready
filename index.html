<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#14402b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ring Ready" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="description" content="Learn and memorize the hunter show ring — courses, terminology, and patterns." />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" href="icons/icon-192.png" />
<title>Ring Ready</title>
<style>
  :root{
    --green-dk:#14402b;
    --green:#1f5138;
    --green-md:#2d6a4a;
    --green-soft:#e4ede7;
    --gold:#c9a227;
    --gold-lt:#e6c659;
    --cream:#f6f2e8;
    --card:#ffffff;
    --ink:#22302a;
    --muted:#6c7a72;
    --red:#c0492f;
    --green-ok:#2e8b57;
    --shadow:0 4px 14px rgba(20,64,43,.12);
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bot:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--cream);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  #app{max-width:480px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;background:var(--cream)}
  /* Header */
  header{
    background:linear-gradient(160deg,var(--green-dk),var(--green));
    color:#fff;padding:calc(var(--safe-top) + 14px) 74px 14px 18px;
    box-shadow:var(--shadow);position:sticky;top:0;z-index:20;
  }
  header .brand{display:flex;align-items:center;gap:10px}
  header .brand .shoe{width:30px;height:30px;flex:none}
  header h1{font-size:20px;margin:0;letter-spacing:.3px;font-weight:700}
  header .greet{font-size:13px;color:var(--gold-lt);margin-top:2px;min-height:16px}
  /* Main */
  main{flex:1;padding:16px 16px 96px;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .view{display:none}
  .view.active{display:block}
  h2.title{font-size:19px;margin:0 0 4px;color:var(--green-dk)}
  p.sub{font-size:13px;color:var(--muted);margin:0 0 14px}
  /* Cards */
  .card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
  .course-card{display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .12s}
  .course-card:active{transform:scale(.98)}
  .course-card .badge{
    width:46px;height:46px;border-radius:12px;flex:none;
    background:var(--green-soft);display:flex;align-items:center;justify-content:center;
    color:var(--green-dk);font-weight:800;font-size:18px;
  }
  .course-card .meta{flex:1;min-width:0}
  .course-card .meta .nm{font-weight:700;font-size:15px;color:var(--ink)}
  .course-card .meta .lv{font-size:12px;color:var(--muted);margin-top:2px}
  .course-card .chev{color:var(--gold);font-size:22px;font-weight:700}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:var(--gold);color:#5a4500;letter-spacing:.3px}
  .pill.saved{background:var(--green-md);color:#fff}
  /* Buttons */
  button{font-family:inherit}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    border:none;border-radius:12px;padding:13px 16px;font-size:15px;font-weight:700;
    background:var(--green);color:#fff;cursor:pointer;transition:transform .1s,filter .1s;width:100%;
  }
  .btn:active{transform:scale(.98)}
  .btn.gold{background:var(--gold);color:#4a3800}
  .btn.ghost{background:transparent;color:var(--green-dk);border:2px solid var(--green-soft)}
  .btn.sm{width:auto;padding:9px 14px;font-size:13px}
  .btn-row{display:flex;gap:10px}
  .btn-row .btn{flex:1}
  .back{background:none;border:none;color:var(--green-dk);font-size:15px;font-weight:700;padding:6px 0;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:4px}
  /* Ring SVG */
  .ringwrap{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:10px;margin-bottom:14px}
  svg.ring{width:100%;height:auto;display:block;border-radius:10px;touch-action:manipulation}
  .ring-foot{fill:#eef4ee}
  .rail{fill:none;stroke:var(--green-dk);stroke-width:3}
  .gline{stroke:var(--green-md);stroke-width:1.6}
  .gline.dash{stroke-dasharray:5 5}
  .gline.gold{stroke:var(--gold)}
  .pole{stroke:var(--gold);stroke-width:5;stroke-linecap:round}
  .pole.dim{stroke:#c9b98f}
  .badge-c{fill:var(--green-dk)}
  .badge-t{fill:#fff;font-size:11px;font-weight:800;text-anchor:middle;dominant-baseline:central}
  .track{fill:none;stroke:var(--green-md);stroke-width:2.4;stroke-dasharray:6 6;stroke-linecap:round;opacity:.9}
  .track.solid{stroke-dasharray:none}
  .tdraw{fill:none;stroke:var(--green);stroke-width:3.2;stroke-linecap:round;stroke-linejoin:round}
  .ideal{fill:none;stroke:var(--gold);stroke-width:2.6;stroke-dasharray:5 5;stroke-linecap:round;opacity:.95}
  .pole.faint{stroke:#cdbf93}
  .badge-c.faint{fill:#9fb3a6}
  svg.trace{touch-action:none}
  .startdot{fill:var(--green-ok)}
  .hit{stroke:transparent;stroke-width:18;fill:none;cursor:pointer}
  .lbl{font-size:10px;fill:var(--green-dk);font-weight:700}
  .lbl.w{fill:#fff}
  /* Steps */
  ol.steps{margin:6px 0 0;padding-left:0;list-style:none;counter-reset:s}
  ol.steps li{position:relative;padding:10px 10px 10px 40px;margin-bottom:8px;background:var(--green-soft);border-radius:12px;font-size:14px;line-height:1.4}
  ol.steps li::before{counter-increment:s;content:counter(s);position:absolute;left:8px;top:9px;width:24px;height:24px;background:var(--green);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
  /* Quiz status */
  .status{font-size:14px;font-weight:700;text-align:center;padding:10px;border-radius:12px;margin-bottom:12px;background:var(--green-soft);color:var(--green-dk);min-height:20px}
  .status.ok{background:#dff3e7;color:var(--green-ok)}
  .status.bad{background:#fbe4de;color:var(--red)}
  /* Flashcard */
  .flash{perspective:1200px;margin-bottom:14px}
  .flash-inner{position:relative;width:100%;min-height:200px;transition:transform .5s;transform-style:preserve-3d;cursor:pointer}
  .flash.flipped .flash-inner{transform:rotateY(180deg)}
  .flash-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
  .flash-front{background:linear-gradient(160deg,var(--green),var(--green-md));color:#fff}
  .flash-front .term{font-size:24px;font-weight:800}
  .flash-front .hint{font-size:12px;color:var(--gold-lt);margin-top:12px}
  .flash-back{background:var(--card);color:var(--ink);transform:rotateY(180deg)}
  .flash-back .def{font-size:16px;line-height:1.5}
  .flash-back .t2{font-size:13px;font-weight:800;color:var(--gold);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
  .counter{text-align:center;font-size:13px;color:var(--muted);margin-bottom:10px}
  /* MC quiz */
  .q-prompt{font-size:16px;font-weight:600;line-height:1.4;margin-bottom:14px;background:var(--card);padding:16px;border-radius:14px;box-shadow:var(--shadow)}
  .q-prompt .tag{display:block;font-size:11px;color:var(--gold);font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .opt{width:100%;text-align:left;background:var(--card);border:2px solid var(--green-soft);border-radius:12px;padding:14px;font-size:15px;font-weight:600;margin-bottom:10px;cursor:pointer;color:var(--ink);transition:.12s}
  .opt:active{transform:scale(.99)}
  .opt.correct{background:#dff3e7;border-color:var(--green-ok);color:var(--green-ok)}
  .opt.wrong{background:#fbe4de;border-color:var(--red);color:var(--red)}
  .opt:disabled{cursor:default}
  /* Patterns grid */
  .pat{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:14px;margin-bottom:14px}
  .pat h3{margin:0 0 2px;font-size:16px;color:var(--green-dk)}
  .pat .cue{font-size:13px;color:var(--ink);line-height:1.45;margin-top:8px}
  .pat svg{width:100%;height:auto;background:#eef4ee;border-radius:10px}
  /* Builder */
  .field{margin-bottom:12px}
  .field label{display:block;font-size:13px;font-weight:700;color:var(--green-dk);margin-bottom:6px}
  .field input,.field select{width:100%;padding:12px;border:2px solid var(--green-soft);border-radius:12px;font-size:15px;background:#fff;color:var(--ink);font-family:inherit}
  .hintbar{font-size:13px;color:var(--muted);text-align:center;margin-bottom:10px}
  /* Bottom nav */
  nav{
    position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;
    background:#fff;border-top:1px solid #e6ddc9;
    display:flex;justify-content:space-around;
    padding:6px 4px calc(6px + var(--safe-bot));z-index:30;box-shadow:0 -3px 14px rgba(20,64,43,.07);
  }
  nav button{
    background:none;border:none;flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:6px 2px;color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;border-radius:10px;
  }
  nav button svg{width:23px;height:23px}
  nav button.active{color:var(--green-dk)}
  nav button.active svg{stroke:var(--green-dk)}
  nav button svg{stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  /* Onboarding overlay */
  .overlay{position:fixed;inset:0;background:linear-gradient(160deg,var(--green-dk),var(--green));z-index:60;display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .3s ease}
  .overlay.hidden{display:none}
  .ob-card{background:var(--card);border-radius:22px;padding:28px 22px;max-width:340px;width:100%;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.3)}
  .ob-card .shoe{width:64px;height:64px;margin-bottom:6px}
  .ob-card h2{margin:6px 0 4px;color:var(--green-dk);font-size:22px}
  .ob-card p{color:var(--muted);font-size:14px;margin:0 0 18px;line-height:1.4}
  .ob-card input{width:100%;padding:14px;border:2px solid var(--green-soft);border-radius:12px;font-size:16px;text-align:center;margin-bottom:14px;font-family:inherit}
  .empty{text-align:center;color:var(--muted);padding:30px 10px;font-size:14px}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--green-dk);color:#fff;padding:11px 18px;border-radius:999px;font-size:14px;font-weight:700;z-index:50;box-shadow:var(--shadow);opacity:0;transition:opacity .25s,transform .25s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  .tabs{display:flex;gap:8px;margin-bottom:14px}
  .tabs button{flex:1;padding:11px;border:none;border-radius:12px;background:var(--green-soft);color:var(--green-dk);font-weight:700;font-size:14px;cursor:pointer}
  .tabs button.active{background:var(--green);color:#fff}
  .scoreline{font-size:13px;color:var(--muted);text-align:center;margin-top:4px}
  /* Photo calibration */
  .calib{position:fixed;inset:0;background:#0d2a1d;z-index:80;display:flex;flex-direction:column}
  .calib-top{padding:calc(var(--safe-top) + 14px) 16px 8px;color:#fff;text-align:center}
  .calib-msg{font-size:15px;font-weight:700;line-height:1.35}
  .calib-sub{font-size:12px;color:var(--gold-lt);margin-top:4px}
  .calib-stage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:8px}
  .calib-stage img{max-width:96vw;max-height:100%;width:auto;height:auto;border-radius:8px;display:block;touch-action:manipulation}
  #cmarks{position:absolute;inset:0;pointer-events:none}
  .cmark{position:absolute;width:26px;height:26px;margin:-13px 0 0 -13px;border-radius:50%;background:var(--gold);color:#3a2c00;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.45)}
  .cmark.gate{background:var(--green-ok);color:#fff;font-size:14px}
  .calib-bar{display:flex;gap:8px;padding:12px 16px calc(12px + var(--safe-bot));background:#0a2217}
  .calib-bar .btn{flex:1}
  /* Rotate controls */
  .rotrow{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;font-weight:700;color:var(--muted)}
  .rotrow span{margin-right:2px}
  .rotbtn{width:40px;height:36px;border:2px solid var(--green-soft);background:#fff;border-radius:10px;font-size:20px;line-height:1;color:var(--green-dk);cursor:pointer}
  .rotbtn:active{transform:scale(.95)}
  /* Ribbons */
  .ribbon-btn{position:absolute;top:calc(var(--safe-top) + 16px);right:16px;background:rgba(255,255,255,.16);border:none;border-radius:999px;padding:4px 12px 4px 6px;display:flex;align-items:center;gap:5px;color:#fff;font-weight:800;font-size:15px;cursor:pointer}
  .ribbon-btn:active{transform:scale(.96)}
  .celebrate{position:fixed;inset:0;background:rgba(10,34,23,.78);z-index:90;display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .25s}
  .cel-card{background:#fff;border-radius:22px;padding:26px 22px;max-width:330px;width:100%;text-align:center;box-shadow:0 12px 44px rgba(0,0,0,.45)}
  .cel-card .rose{display:inline-block;animation:pop .55s cubic-bezier(.2,1.35,.4,1)}
  @keyframes pop{from{transform:scale(.3) rotate(-18deg);opacity:0}to{transform:none;opacity:1}}
  .cel-card h2{margin:8px 0 2px;color:var(--green-dk);font-size:24px}
  .cel-card p{margin:0 0 16px;color:var(--muted);font-size:14px;line-height:1.4}
  .case-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin:6px 0 10px}
  .case-item{display:flex;flex-direction:column;align-items:center;width:74px}
  .case-item .cnt{font-weight:800;color:var(--green-dk);font-size:14px;margin-top:1px}
  .case-total{text-align:center;font-weight:800;color:var(--green-dk);font-size:15px}
  .case-empty{text-align:center;color:var(--muted);padding:20px 6px;font-size:14px;line-height:1.5}
  .case-log{margin-top:12px;border-top:1px solid var(--green-soft);padding-top:8px;max-height:32vh;overflow:auto}
  .case-log .row{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:13px;color:var(--ink)}
  .case-log .row b{color:var(--green-dk)}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <svg class="shoe" viewBox="0 0 100 100" aria-hidden="true">
        <path d="M50 12c-16 0-27 12-27 30 0 13 5 26 9 36 2 5 7 8 12 8h0c2 0 4-2 4-4 0-2-1-3-3-4-3-2-6-4-7-8-3-9-6-19-6-28 0-13 7-20 18-20s18 7 18 20c0 9-3 19-6 28-1 4-4 6-7 8-2 1-3 2-3 4 0 2 2 4 4 4 5 0 10-3 12-8 4-10 9-23 9-36 0-18-11-30-27-30z" fill="#c9a227"/>
        <circle cx="31" cy="78" r="3.4" fill="#c9a227"/><circle cx="69" cy="78" r="3.4" fill="#c9a227"/>
        <circle cx="27" cy="62" r="3" fill="#c9a227"/><circle cx="73" cy="62" r="3" fill="#c9a227"/>
        <circle cx="26" cy="46" r="3" fill="#c9a227"/><circle cx="74" cy="46" r="3" fill="#c9a227"/>
      </svg>
      <div>
        <h1>Ring Ready</h1>
        <div class="greet" id="greet"></div>
      </div>
    </div>
    <button id="ribbonBtn" class="ribbon-btn" aria-label="My ribbons"></button>
  </header>

  <main>
    <!-- COURSES -->
    <section class="view active" id="view-courses"></section>
    <!-- SPATIAL -->
    <section class="view" id="view-spatial"></section>
    <!-- BUILDER -->
    <section class="view" id="view-build"></section>
    <!-- RING GEOGRAPHY -->
    <section class="view" id="view-ring"></section>
    <!-- TERMINOLOGY -->
    <section class="view" id="view-terms"></section>
    <!-- PATTERNS -->
    <section class="view" id="view-patterns"></section>
  </main>

  <nav id="nav">
    <button data-view="courses" class="active">
      <svg viewBox="0 0 24 24"><path d="M4 5h16M4 12h16M4 19h10"/><circle cx="19" cy="19" r="1.6"/></svg>
      Courses
    </button>
    <button data-view="spatial">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M15 9l-2.5 5.5L9 15l2.5-5.5z"/></svg>
      Spatial
    </button>
    <button data-view="build">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Build
    </button>
    <button data-view="ring">
      <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M3 12h18M12 6v12"/></svg>
      Ring
    </button>
    <button data-view="terms">
      <svg viewBox="0 0 24 24"><path d="M4 6h16v12H4z"/><path d="M4 10h16"/></svg>
      Terms
    </button>
    <button data-view="patterns">
      <svg viewBox="0 0 24 24"><path d="M5 19c4-10 10-10 14 0"/><circle cx="5" cy="19" r="1.6"/><circle cx="19" cy="19" r="1.6"/></svg>
      Patterns
    </button>
  </nav>
</div>

<!-- Onboarding -->
<div class="overlay" id="onboard">
  <div class="ob-card">
    <svg class="shoe" viewBox="0 0 100 100" aria-hidden="true">
      <path d="M50 12c-16 0-27 12-27 30 0 13 5 26 9 36 2 5 7 8 12 8h0c2 0 4-2 4-4 0-2-1-3-3-4-3-2-6-4-7-8-3-9-6-19-6-28 0-13 7-20 18-20s18 7 18 20c0 9-3 19-6 28-1 4-4 6-7 8-2 1-3 2-3 4 0 2 2 4 4 4 5 0 10-3 12-8 4-10 9-23 9-36 0-18-11-30-27-30z" fill="#c9a227"/>
      <circle cx="31" cy="78" r="3.4" fill="#c9a227"/><circle cx="69" cy="78" r="3.4" fill="#c9a227"/>
      <circle cx="27" cy="62" r="3" fill="#c9a227"/><circle cx="73" cy="62" r="3" fill="#c9a227"/>
      <circle cx="26" cy="46" r="3" fill="#c9a227"/><circle cx="74" cy="46" r="3" fill="#c9a227"/>
    </svg>
    <h2>Welcome to Ring Ready</h2>
    <p>Your pocket coach for finding your way around the show ring — courses, lines, distances, and terms. What's your name?</p>
    <input id="nameInput" type="text" placeholder="Your name" autocomplete="off" maxlength="20" />
    <button class="btn gold" id="startBtn">Let's ride 🐴</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================ Ring geometry ============================ */
const RING = {x0:20,y0:20,x1:340,y1:220};
const VB = "0 0 360 240";

/* Rotation (90° steps) applied to a course diagram. ROT is set while a
   diagram is being built so the shared helpers can counter-rotate text. */
let ROT = 0;
function ringVB(rot){ return (((rot||0)%180)===0) ? "-14 -16 388 272" : "40 -64 280 368"; }
function rotPt(x,y,deg){ const r=deg*Math.PI/180,cx=180,cy=120,dx=x-cx,dy=y-cy; return {x:cx+dx*Math.cos(r)-dy*Math.sin(r), y:cy+dx*Math.sin(r)+dy*Math.cos(r)}; }
function getRot(id){ try{ return (JSON.parse(localStorage.getItem('rr_rot')||'{}')[id])||0; }catch(e){ return 0; } }
function setRotStore(id,deg){ let m={}; try{ m=JSON.parse(localStorage.getItem('rr_rot')||'{}'); }catch(e){} m[id]=((deg%360)+360)%360; localStorage.setItem('rr_rot',JSON.stringify(m)); }

/* ============================ Data: courses ============================ */
const COURSES = [
  {
    id:"shortstirrup", name:"Short Stirrup Hunter", level:"2'0\" Short Stirrup",
    jumps:[
      {n:1,x:115,y:52},{n:2,x:245,y:52},
      {n:3,x:235,y:82},{n:4,x:140,y:150},
      {n:5,x:115,y:190},{n:6,x:245,y:190},
      {n:7,x:235,y:150},{n:8,x:125,y:82}
    ],
    lines:[{a:0,b:1,s:6},{a:2,b:3,s:5},{a:4,b:5,s:6},{a:6,b:7,s:5}],
    path:[[180,205],[88,118],[115,52],[245,52],[305,68],[235,82],[140,150],[95,170],[115,190],[245,190],[305,172],[235,150],[125,82],[88,95]],
    steps:[
      "Trot into the ring, pick up the right-lead canter, and ride one smooth opening circle to settle into an even hunter pace.",

/* ============================ Data: terminology ============================ */
const TERMS = [
  {t:"Posting Diagonal", d:"At the trot, you rise and sit with the horse's outside front leg. Easy way to remember: “rise and fall with the leg on the wall.”"},
  {t:"Lead", d:"At the canter, the pair of legs (front and hind) on one side reach farther forward. The horse is on the “left lead” or “right lead.”"},
  {t:"Correct Lead", d:"Cantering on the lead that matches your direction — the inside front leg leads. Tracking right = right lead; tracking left = left lead."},
  {t:"Flying Change", d:"Switching canter leads in the air, during the moment of suspension, without breaking to a trot or walk."},
  {t:"Simple Change", d:"Changing leads by coming back to a walk (or a few trot steps) for a stride or two, then picking up the new lead."},
  {t:"Pace", d:"How fast and forward the horse is going — the speed and energy of the gait. A good hunter pace is even and steady."},
  {t:"Stride", d:"One full cycle of the horse's legs. A horse's canter stride is about 12 feet, which is how distances between jumps are measured."},
  {t:"Distance", d:"The take-off spot in front of a jump, and the number of strides between two jumps. A good distance lets the horse leave the ground smoothly."},
  {t:"Outside Line", d:"Two jumps set in a straight line along the long rail (outside) of the ring, ridden one after the other."},
  {t:"Diagonal Line", d:"Two jumps set on a diagonal across the middle of the ring, ridden as a line from corner toward corner."},
  {t:"Single", d:"One jump on its own that is not part of a line — ridden by itself."},
  {t:"Bending Line", d:"Two jumps that aren't in a straight line, so you ride a gentle curve (a bend) between them to meet each one straight."},
  {t:"Opening Circle", d:"A circle you ride at the start, before fence 1, to establish your pace and rhythm. Also called the courtesy circle."},
  {t:"Closing Circle", d:"A circle after the last fence to finish smoothly, balance the horse, and come back to a trot or walk."},
  {t:"Hunter", d:"A show horse judged on manners, smooth movement, and a pleasant, even way of jumping — it should look easy and relaxed."},
  {t:"Course", d:"The set order of jumps you ride. You must take them in the correct numbered sequence."},
  {t:"Course Walk", d:"Walking the course on foot before you ride, to plan your track, find your lines, and count the strides."},
  {t:"Under Saddle / Flat", d:"A class with no jumping — the horse is judged at the walk, trot, and canter on the flat."},
  {t:"Manners", d:"How well-behaved and obedient the horse is — quiet, willing, and easy to ride. Very important for hunters."},
  {t:"Way of Going", d:"The overall quality of how the horse moves — its rhythm, balance, and smoothness across the gaits."}
];

/* ---- SVG building blocks ---- */
function ringFrameSVG(opts){
  opts = opts||{};
  let s = `<rect class="ring-foot" x="${RING.x0}" y="${RING.y0}" width="${RING.x1-RING.x0}" height="${RING.y1-RING.y0}" rx="14"/>`;
  if(opts.center) s += `<line class="gline dash" x1="${RING.x0}" y1="120" x2="${RING.x1}" y2="120"/>`;
  if(opts.quarter){
    s += `<line class="gline dash gold" x1="${RING.x0}" y1="70" x2="${RING.x1}" y2="70"/>`;
    s += `<line class="gline dash gold" x1="${RING.x0}" y1="170" x2="${RING.x1}" y2="170"/>`;
  }
  if(opts.diag){
    s += `<line class="gline dash" x1="${RING.x0}" y1="${RING.y0}" x2="${RING.x1}" y2="${RING.y1}"/>`;
    s += `<line class="gline dash" x1="${RING.x1}" y1="${RING.y0}" x2="${RING.x0}" y2="${RING.y1}"/>`;
  }
  s += `<rect class="rail" x="${RING.x0}" y="${RING.y0}" width="${RING.x1-RING.x0}" height="${RING.y1-RING.y0}" rx="14"/>`;
  if(opts.gate) s += gateSVG(opts.gateFrac);
  return s;
}
/* In-gate reference on the bottom rail. frac = position along that rail (0..1). */
function gateSVG(frac){
  if(frac==null) frac=0.41;
  frac=Math.max(0.12,Math.min(0.88,frac));
  const cx=RING.x0+frac*(RING.x1-RING.x0), y=RING.y1, x1=cx-21, x2=cx+21, ly=y+16;
  return `<rect x="${x1.toFixed(1)}" y="${y-3}" width="42" height="6" fill="#eef4ee"/>`
    + `<line x1="${x1.toFixed(1)}" y1="${y-7}" x2="${x1.toFixed(1)}" y2="${y+7}" stroke="#c9a227" stroke-width="4" stroke-linecap="round"/>`
    + `<line x1="${x2.toFixed(1)}" y1="${y-7}" x2="${x2.toFixed(1)}" y2="${y+7}" stroke="#c9a227" stroke-width="4" stroke-linecap="round"/>`
    + `<text class="lbl" x="${cx.toFixed(1)}" y="${ly}" text-anchor="middle" transform="rotate(${-ROT} ${cx.toFixed(1)} ${ly})">In-gate</text>`;
}

/* Catmull-Rom smoothed path */
function smoothD(pts){
  if(pts.length<2) return "";
  let d = `M ${pts[0][0]} ${pts[0][1]}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i], p1=pts[i], p2=pts[i+1], p3=pts[i+2]||pts[i+1];
    const c1x=p1[0]+(p2[0]-p0[0])/6, c1y=p1[1]+(p2[1]-p0[1])/6;
    const c2x=p2[0]-(p3[0]-p1[0])/6, c2y=p2[1]-(p3[1]-p1[1])/6;
    d += ` C ${c1x.toFixed(1)} ${c1y.toFixed(1)}, ${c2x.toFixed(1)} ${c2y.toFixed(1)}, ${p2[0]} ${p2[1]}`;
  }
  return d;
}

/* direction (unit) for jump i based on neighbours */
function jumpDir(jumps,i){
  const a = jumps[i-1]||jumps[i], b = jumps[i+1]||jumps[i];
  let dx=b.x-a.x, dy=b.y-a.y; const m=Math.hypot(dx,dy)||1;
  return [dx/m,dy/m];
}
function poleFor(j,dir,cls){
  const L=13; const px=-dir[1]*L, py=dir[0]*L;
  return `<line class="pole ${cls||''}" x1="${(j.x-px).toFixed(1)}" y1="${(j.y-py).toFixed(1)}" x2="${(j.x+px).toFixed(1)}" y2="${(j.y+py).toFixed(1)}"/>`;
}
function badge(j,n,rot){
  const R = (rot==null?ROT:rot);
  return `<circle class="badge-c" cx="${j.x}" cy="${j.y}" r="9"/><text class="badge-t" x="${j.x}" y="${j.y}" transform="rotate(${-R} ${j.x} ${j.y})">${n}</text>`;
}

/* Build a full course study diagram */
function courseStudySVG(c){
  ROT = getRot(c.id);
  const path = c.path || c.jumps.map(j=>[j.x,j.y]);
  const sx=path[0][0], sy=path[0][1];
  let s = `<svg class="ring" viewBox="${ringVB(ROT)}"><defs><marker id="arr" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#2d6a4a"/></marker></defs>`;
  s += `<g transform="rotate(${ROT} 180 120)">`;
  s += ringFrameSVG({gate:true,gateFrac:c.gate});
  s += `<path class="track" marker-end="url(#arr)" d="${smoothD(path)}"/>`;
  s += `<circle class="startdot" cx="${sx}" cy="${sy}" r="4"/>`;
  s += `<text class="lbl" x="${sx-4}" y="${sy-8}" transform="rotate(${-ROT} ${sx-4} ${sy-8})">start</text>`;
  c.jumps.forEach((j,i)=>{ s += poleFor(j,jumpDir(c.jumps,i)) + badge(j,j.n); });
  s += `</g></svg>`;
  ROT = 0;
  return s;
}

/* Quiz: tap jumps in order */
function renderQuiz(c){
  const rotq = getRot(c.id); ROT = rotq;
  let h = `<div class="status" id="qstatus">Tap the jumps in the correct order. Start with fence 1.</div>`;
  h += `<div class="ringwrap"><svg class="ring" viewBox="${ringVB(rotq)}" id="qsvg"><g transform="rotate(${rotq} 180 120)">`;
  h += ringFrameSVG({gate:true,gateFrac:c.gate});
  c.jumps.forEach((j,i)=>{ h += `<g id="qj-${i}">`+poleFor(j,jumpDir(c.jumps,i),'dim')+`<circle cx="${j.x}" cy="${j.y}" r="11" fill="transparent"/></g>`; });
  h += `</g></svg></div>`;
  ROT = 0;
  h += `<div class="btn-row"><button class="btn ghost" id="qreset">Restart</button><button class="btn gold" id="qpeek">Show me</button></div>`;
  h += `<div class="scoreline" id="qscore"></div>`;
  el('course-body').innerHTML = h;

  let expected = 0; let wrongs = 0; let done=false;
  const svg = el('qsvg');
  function setStatus(msg,cls){const s=el('qstatus');s.textContent=msg;s.className='status'+(cls?' '+cls:'');}
  function reveal(i){
    const j=c.jumps[i]; const g=el('qj-'+i);
    g.querySelector('.pole').classList.remove('dim');
    g.insertAdjacentHTML('beforeend', badge(j,j.n,rotq));
  }
  svg.addEventListener('click',(e)=>{
    if(done) return;
    const pt = svgPoint(svg,e);
    // nearest jump (compare against each jump's on-screen, rotated position)
    let best=-1,bd=1e9;
    c.jumps.forEach((j,i)=>{const d=rotPt(j.x,j.y,rotq); const dist=Math.hypot(d.x-pt.x,d.y-pt.y); if(dist<bd){bd=dist;best=i;}});
    if(best<0||bd>34) return; // too far from any jump
    if(best===expected){
      reveal(best); expected++;
      if(expected>=c.jumps.length){
        done=true;
        setStatus(wrongs===0?`Perfect round! Clear with no mistakes 🏆`:`Course complete! ${wrongs} wrong tap${wrongs===1?'':'s'}.`, 'ok');
        const place = wrongs===0?1:(wrongs<=2?2:(wrongs<=4?3:0));
        awardRibbon(place,'Course order',`${c.name} — ${wrongs===0?'clear round!':wrongs+' wrong tap'+(wrongs===1?'':'s')}`);
      }else{
        setStatus(`Nice — fence ${best+1}! Now find fence ${expected+1}.`,'ok');
      }
    }else{
      wrongs++;
      const correctN = c.jumps.find((j,idx)=>idx===expected).n;
      setStatus(`Not yet — that's fence ${c.jumps[best].n}. You need fence ${correctN} next.`,'bad');
    }
    el('qscore').textContent = `Progress: ${expected}/${c.jumps.length} · Wrong taps: ${wrongs}`;
  });
  el('qreset').addEventListener('click',()=>renderQuiz(c));
  el('qpeek').addEventListener('click',()=>{setTab('study');renderStudy(c);});
}

function svgPoint(svg,evt){
  const pt = svg.createSVGPoint();
  const src = (evt.touches&&evt.touches[0])||(evt.changedTouches&&evt.changedTouches[0])||evt;
  pt.x = src.clientX; pt.y = src.clientY;
  const ctm = svg.getScreenCTM();
  return ctm ? pt.matrixTransform(ctm.inverse()) : {x:0,y:0};
}

/* Trace the track: draw the whole riding path with a finger */
function renderTrace(c){
  const rott = getRot(c.id); ROT = rott;
  const ideal = c.path || c.jumps.map(j=>[j.x,j.y]);
  const sx=ideal[0][0], sy=ideal[0][1];
  let h = `<div class="status" id="tstatus">Ride the whole track from memory — finger-trace through every fence in the right order.</div>`;
  h += `<div class="ringwrap"><svg class="ring trace" viewBox="${ringVB(rott)}" id="tsvg"><g transform="rotate(${rott} 180 120)">`;
  h += ringFrameSVG({gate:true,gateFrac:c.gate});
  h += `<circle class="startdot" cx="${sx}" cy="${sy}" r="4"/>`;
  h += `<text class="lbl" x="${sx-4}" y="${sy-8}" transform="rotate(${-rott} ${sx-4} ${sy-8})">start</text>`;
  // show where the jumps are, but NOT their order — she has to remember it
  c.jumps.forEach((j,i)=>{ h += poleFor(j,jumpDir(c.jumps,i),'faint') + `<circle class="badge-c faint" cx="${j.x}" cy="${j.y}" r="3.5"/>`; });
  h += `<path class="ideal" id="tideal" style="display:none" d="${smoothD(ideal)}"/>`;
  h += `<path class="tdraw" id="tdraw" d=""/>`;
  h += `</g></svg></div>`;
  ROT = 0;
  h += `<div class="btn-row"><button class="btn ghost" id="tclear">Clear</button><button class="btn gold" id="tshow">Show ideal track</button></div>`;
  h += `<div class="scoreline" id="tscore"></div>`;
  el('course-body').innerHTML = h;

  const svg = el('tsvg'), draw = el('tdraw');
  let drawing=false, pts=[], traceAwarded=false;
  function setStatus(m,cls){const s=el('tstatus');s.textContent=m;s.className='status'+(cls?' '+cls:'');}
  function start(e){ e.preventDefault(); drawing=true; pts=[]; if(e.pointerId!=null&&svg.setPointerCapture){ try{svg.setPointerCapture(e.pointerId);}catch(_){} } add(e); }
  function add(e){ if(!drawing) return;
    const d=svgPoint(svg,e); const cc=rotPt(d.x,d.y,-rott); // tap -> course space
    // keep the line inside the ring — clamp to the rail; a polyline between
    // in-ring points can't leave the (rectangular) ring.
    const cx=Math.max(RING.x0+2,Math.min(RING.x1-2,cc.x)), cy=Math.max(RING.y0+2,Math.min(RING.y1-2,cc.y));
    pts.push([cx,cy]);
    draw.setAttribute('d', pts.length>1 ? 'M '+pts.map(q=>q[0].toFixed(1)+' '+q[1].toFixed(1)).join(' L ') : '');
  }
  function end(){ if(!drawing) return; drawing=false; evaluate(); }
  function evaluate(){
    if(pts.length<6){ setStatus('Draw your whole track around the ring with your finger.'); return; }
    // greedy in-order coverage of fences (convert drawn points back to course space)
    let expected=0;
    for(const p of pts){
      if(expected>=c.jumps.length) break;
      const j=c.jumps[expected];
      if(Math.hypot(j.x-p[0],j.y-p[1])<26) expected++;
    }
    const total=c.jumps.length;
    if(expected===total){
      setStatus(`That's the whole track — all ${total} fences in order! Tap “Show ideal track” to compare your route.`,'ok');
      if(!traceAwarded){ traceAwarded=true; awardRibbon(1,'Course trace',`${c.name} — whole track from memory!`); }
    }else{
      setStatus(`You rode ${expected} of ${total} fences in order. Next you needed fence ${expected+1} — keep your line smooth and ride right through it.`,'bad');
    }
    el('tscore').textContent = `Fences ridden in order: ${expected}/${total}`;
  }
  svg.addEventListener('pointerdown',start);
  svg.addEventListener('pointermove',add);
  svg.addEventListener('pointerup',end);
  svg.addEventListener('pointercancel',end);
  // touch fallback for browsers without pointer events
  svg.addEventListener('touchstart',start,{passive:false});
  svg.addEventListener('touchmove',e=>{e.preventDefault();add(e);},{passive:false});
  svg.addEventListener('touchend',end);
  el('tclear').addEventListener('click',()=>{pts=[];draw.setAttribute('d','');el('tideal').style.display='none';el('tscore').textContent='';setStatus('Ride the whole track from memory — finger-trace through every fence in the right order.');});
  el('tshow').addEventListener('click',()=>{const ti=el('tideal');ti.style.display=ti.style.display==='none'?'block':'none';});
}

function refreshBuildRing(){
  const wrap=el('bringwrap'); if(!wrap) return;
  wrap.innerHTML = buildRingSVG();
  drawBuildJumps();
  const svg = el('bsvg');
  svg.addEventListener('click',(e)=>{
    const pt = svgPoint(svg,e);
    const cp = rotPt(pt.x,pt.y,-buildRot); // tap -> course space
    if(cp.x<RING.x0+6||cp.x>RING.x1-6||cp.y<RING.y0+6||cp.y>RING.y1-6) return;
    let best=-1,bd=1e9;
    buildJumps.forEach((j,i)=>{const d=Math.hypot(j.x-cp.x,j.y-cp.y);if(d<bd){bd=d;best=i;}});
    if(best>=0&&bd<20){ buildJumps.splice(best,1); buildJumps.forEach((j,i)=>j.n=i+1); }
    else { buildJumps.push({n:buildJumps.length+1,x:Math.round(cp.x),y:Math.round(cp.y)}); }
    drawBuildJumps();
  });
}

/* Pick an image from camera/library and downscale it for localStorage */
function pickImage(cb){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.addEventListener('change',()=>{
    const f=inp.files&&inp.files[0]; if(!f) return;
    const fr=new FileReader();
    fr.onload=()=>{ const img=new Image(); img.onload=()=>cb(downscaleImage(img)); img.onerror=()=>toast('Could not read that photo'); img.src=fr.result; };
    fr.onerror=()=>toast('Could not read that photo');
    fr.readAsDataURL(f);
  });
  inp.click();
}
function downscaleImage(img,max=1100,q=0.72){
  let w=img.naturalWidth||img.width, hgt=img.naturalHeight||img.height;
  const sc=Math.min(1,max/Math.max(w,hgt));
  w=Math.round(w*sc); hgt=Math.round(hgt*sc);
  const cv=document.createElement('canvas'); cv.width=w; cv.height=hgt;
  cv.getContext('2d').drawImage(img,0,0,w,hgt);
  try{ return cv.toDataURL('image/jpeg',q); }catch(e){ return img.src; }
}

/* Calibrate a posted-course photo: tap the ring's 4 corners + the in-gate,
   then warp it so the ring fills the app ring with the gate at the bottom. */
function openCalibration(rawUrl,onDone){
  const ov=document.createElement('div'); ov.className='calib';
  ov.innerHTML=`
    <div class="calib-top"><div class="calib-msg" id="cmsg">Tap the 4 corners of the ring in the photo.</div>
      <div class="calib-sub" id="csub">Tap corner 1 of 4</div></div>
    <div class="calib-stage" id="cstage"><img id="cimg" alt="course photo"><div id="cmarks"></div></div>
    <div class="calib-bar">
      <button class="btn ghost sm" id="ccancel">Cancel</button>
      <button class="btn ghost sm" id="credo" style="display:none">Start over</button>
      <button class="btn ghost sm" id="craw">Use as-is</button>
      <button class="btn sm" id="cuse" style="display:none">Use this</button>
    </div>`;
  document.body.appendChild(ov);
  const img=ov.querySelector('#cimg'), stageEl=ov.querySelector('#cstage'), marks=ov.querySelector('#cmarks');
  let pts=[], gate=null, stage='corners';
  img.src=rawUrl;
  function setMsg(m,s){ ov.querySelector('#cmsg').textContent=m; if(s!==undefined) ov.querySelector('#csub').textContent=s; }
  function redraw(){
    marks.innerHTML='';
    pts.forEach((p,i)=>{ const m=document.createElement('div'); m.className='cmark'; m.style.left=p.dx+'px'; m.style.top=p.dy+'px'; m.textContent=i+1; marks.appendChild(m); });
    if(gate){ const m=document.createElement('div'); m.className='cmark gate'; m.style.left=gate.dx+'px'; m.style.top=gate.dy+'px'; m.textContent='G'; marks.appendChild(m); }
  }
  stageEl.addEventListener('click',ev=>{
    const ir=img.getBoundingClientRect(), sr=stageEl.getBoundingClientRect();
    if(ev.clientX<ir.left||ev.clientX>ir.right||ev.clientY<ir.top||ev.clientY>ir.bottom) return;
    const sx=(ev.clientX-ir.left)/ir.width*img.naturalWidth;
    const sy=(ev.clientY-ir.top)/ir.height*img.naturalHeight;
    const p={sx,sy,dx:ev.clientX-sr.left,dy:ev.clientY-sr.top};
    if(stage==='corners'){
      pts.push(p); redraw();
      if(pts.length===4){ stage='gate'; setMsg('Now tap the in-gate (where horses enter the ring).','This sets which side is the bottom.'); }
      else setMsg('Tap the 4 corners of the ring in the photo.',`Tap corner ${pts.length+1} of 4`);
    }else if(stage==='gate'){
      gate=p; redraw(); stage='confirm';
      setMsg('Looks right?','Use this photo, or start over.');
      ov.querySelector('#cuse').style.display=''; ov.querySelector('#credo').style.display='';
    }
  });
  function close(){ ov.remove(); }
  ov.querySelector('#ccancel').addEventListener('click',close);
  ov.querySelector('#craw').addEventListener('click',()=>{ onDone(rawUrl); close(); });
  ov.querySelector('#credo').addEventListener('click',()=>{
    pts=[]; gate=null; stage='corners'; redraw();
    setMsg('Tap the 4 corners of the ring in the photo.','Tap corner 1 of 4');
    ov.querySelector('#cuse').style.display='none'; ov.querySelector('#credo').style.display='none';
  });
  ov.querySelector('#cuse').addEventListener('click',()=>{
    setMsg('Lining up the photo…','');
    const ordered=orderCorners(pts.map(p=>[p.sx,p.sy]), gate?[gate.sx,gate.sy]:null);
    let gf=null;
    if(gate){ const BL=ordered[3], BR=ordered[2]; const ex=BR[0]-BL[0], ey=BR[1]-BL[1]; const len2=ex*ex+ey*ey||1;
      gf=Math.max(0,Math.min(1, ((gate.sx-BL[0])*ex+(gate.sy-BL[1])*ey)/len2 )); }
    rectifyPhoto(rawUrl,ordered,url=>{ onDone(url,gf); close(); });
  });
}
/* order 4 points to [TL,TR,BR,BL], then rotate so the gate edge is the bottom */
function orderCorners(p,gate){
  let TL=p[0],TR=p[0],BR=p[0],BL=p[0],sMin=1e9,sMax=-1e9,dMin=1e9,dMax=-1e9;
  p.forEach(q=>{ const s=q[0]+q[1], d=q[0]-q[1];
    if(s<sMin){sMin=s;TL=q;} if(s>sMax){sMax=s;BR=q;}
    if(d<dMin){dMin=d;BL=q;} if(d>dMax){dMax=d;TR=q;} });
  let c=[TL,TR,BR,BL];
  if(gate){
    const edges=[[0,1],[1,2],[2,3],[3,0]]; let best=2,bd=1e9;
    edges.forEach((e,i)=>{ const mx=(c[e[0]][0]+c[e[1]][0])/2, my=(c[e[0]][1]+c[e[1]][1])/2; const dd=Math.hypot(mx-gate[0],my-gate[1]); if(dd<bd){bd=dd;best=i;} });
    const r=((best-2)%4+4)%4;
    c=c.slice(r).concat(c.slice(0,r));
  }
  return c;
}
/* projective map from unit square corners (0,0)(1,0)(1,1)(0,1) to a quad */
function squareToQuad(q){
  const x0=q[0][0],y0=q[0][1],x1=q[1][0],y1=q[1][1],x2=q[2][0],y2=q[2][1],x3=q[3][0],y3=q[3][1];
  const dx1=x1-x2,dx2=x3-x2,dx3=x0-x1+x2-x3,dy1=y1-y2,dy2=y3-y2,dy3=y0-y1+y2-y3;
  let a,b,c,d,e,f,g,h;
  if(Math.abs(dx3)<1e-6&&Math.abs(dy3)<1e-6){ a=x1-x0;b=x2-x1;c=x0;d=y1-y0;e=y2-y1;f=y0;g=0;h=0; }
  else{ const den=dx1*dy2-dx2*dy1; g=(dx3*dy2-dx2*dy3)/den; h=(dx1*dy3-dx3*dy1)/den;
    a=x1-x0+g*x1; b=x3-x0+h*x3; c=x0; d=y1-y0+g*y1; e=y3-y0+h*y3; f=y0; }
  return [a,b,c,d,e,f,g,h];
}
/* warp the photo so the ring corners map to a ring-shaped rectangle */
function rectifyPhoto(rawUrl,corners,cb){
  const img=new Image();
  img.onload=()=>{
    const sw=img.naturalWidth, sh=img.naturalHeight;
    const sc=document.createElement('canvas'); sc.width=sw; sc.height=sh;
    const sx2=sc.getContext('2d'); sx2.drawImage(img,0,0);
    let src; try{ src=sx2.getImageData(0,0,sw,sh).data; }catch(e){ cb(rawUrl); return; }
    const OW=660, OH=Math.round(OW*(RING.y1-RING.y0)/(RING.x1-RING.x0)); // match ring aspect
    const oc=document.createElement('canvas'); oc.width=OW; oc.height=OH;
    const octx=oc.getContext('2d'); const out=octx.createImageData(OW,OH); const od=out.data;
    const [a,b,c,d,e,f,g,h]=squareToQuad(corners);
    for(let vy=0;vy<OH;vy++){ const v=vy/OH;
      for(let vx=0;vx<OW;vx++){ const u=vx/OW;
        const w=g*u+h*v+1, X=(a*u+b*v+c)/w, Y=(d*u+e*v+f)/w;
        const ix=X|0, iy=Y|0, o=(vy*OW+vx)*4;
        if(ix>=0&&ix<sw&&iy>=0&&iy<sh){ const si=(iy*sw+ix)*4; od[o]=src[si];od[o+1]=src[si+1];od[o+2]=src[si+2];od[o+3]=255; }
        else { od[o]=238;od[o+1]=244;od[o+2]=238;od[o+3]=255; }
      }
    }
    octx.putImageData(out,0,0);
    try{ cb(oc.toDataURL('image/jpeg',0.82)); }catch(e){ cb(rawUrl); }
  };
  img.onerror=()=>cb(rawUrl);
  img.src=rawUrl;
}
function drawBuildJumps(){
  const g = el('bjumps'); if(!g) return;
  ROT = buildRot;
  let s = '';
  if(buildJumps.length>1) s += `<path class="track" d="${smoothD(buildJumps.map(j=>[j.x,j.y]))}"/>`;
  buildJumps.forEach((j,i)=>{ s += poleFor(j,jumpDir(buildJumps,i)) + badge(j,j.n); });
  g.innerHTML = s;
  ROT = 0;
  const hint=el('bhint'); if(hint) hint.textContent = buildJumps.length===0 ? (buildPhoto?'Photo lined up — now tap each numbered jump on the picture, in order.':'0 jumps placed — tap inside the ring to start.')
    : `${buildJumps.length} jump${buildJumps.length===1?'':'s'} placed. Tap a jump to remove it.`;
}
function saveBuild(){
  const name = (el('bname').value||'').trim();
  if(!name){toast('Give your course a name first');el('bname').focus();return;}
  if(buildJumps.length<2){toast('Add at least 2 jumps');return;}
  const saved = getSaved();
  const id='u'+Date.now();
  const course = {
    id,
    name, level: el('blevel').value,
    jumps: buildJumps.map((j,i)=>({n:i+1,x:j.x,y:j.y})),
    gate: buildGate
  };
  if(buildPhoto) course.photo = buildPhoto;
  saved.push(course);
  try{ setSaved(saved); }
  catch(err){ toast('Storage full — try removing an old course or the photo'); return; }
  if(buildRot) setRotStore(id, buildRot);
  toast('Saved! Find it in Courses');
  buildJumps=[]; buildPhoto=null; buildGate=0.41; buildRot=0;
  renderBuilder();
}

/* ============================ RING GEOGRAPHY section ============================ */
function geoSVG(interactive,target){
  let s = `<svg class="ring" viewBox="${VB}" id="gsvg">`;
  s += `<rect class="ring-foot" x="${RING.x0}" y="${RING.y0}" width="${RING.x1-RING.x0}" height="${RING.y1-RING.y0}" rx="14"/>`;
  // diagonals
  s += line('diagonal',`<line class="gline dash" x1="${RING.x0}" y1="${RING.y0}" x2="${RING.x1}" y2="${RING.y1}"/>`,RING.x0,RING.y0,RING.x1,RING.y1,interactive);
  s += line('diagonal',`<line class="gline dash" x1="${RING.x1}" y1="${RING.y0}" x2="${RING.x0}" y2="${RING.y1}"/>`,RING.x1,RING.y0,RING.x0,RING.y1,interactive);
  // quarter lines
  s += line('quarter line',`<line class="gline dash gold" x1="${RING.x0}" y1="70" x2="${RING.x1}" y2="70"/>`,RING.x0,70,RING.x1,70,interactive);
  s += line('quarter line',`<line class="gline dash gold" x1="${RING.x0}" y1="170" x2="${RING.x1}" y2="170"/>`,RING.x0,170,RING.x1,170,interactive);
  // centerline
  s += line('centerline',`<line class="gline dash" x1="${RING.x0}" y1="120" x2="${RING.x1}" y2="120"/>`,RING.x0,120,RING.x1,120,interactive);
  // rail (rectangle) — hit as 4 edges
  s += `<rect class="rail" x="${RING.x0}" y="${RING.y0}" width="${RING.x1-RING.x0}" height="${RING.y1-RING.y0}" rx="14"/>`;
  if(interactive){
    s += `<rect class="hit" data-name="rail" x="${RING.x0}" y="${RING.y0}" width="${RING.x1-RING.x0}" height="${RING.y1-RING.y0}" rx="14"/>`;
  }
  if(!interactive){
    s += `<text class="lbl" x="${RING.x0+6}" y="${RING.y0-6}">Rail</text>`;
    s += `<text class="lbl" x="${RING.x1-72}" y="118">Centerline</text>`;
    s += `<text class="lbl" x="26" y="66">Quarter line</text>`;
    s += `<text class="lbl" x="26" y="166">Quarter line</text>`;
    s += `<text class="lbl" x="120" y="40">Diagonal</text>`;
  }
  s += gateSVG();
  s += `</svg>`;
  return s;
}
function line(name,visible,x1,y1,x2,y2,interactive){
  let s = visible;
  if(interactive) s += `<line class="hit" data-name="${name}" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"/>`;
  return s;
}
function renderRing(){
  let h = `<h2 class="title">Ring Geography</h2><p class="sub">Know every line in the ring. These are the lines you'll use to plan your track.</p>`;
  h += `<div class="ringwrap">${geoSVG(false)}</div>`;
  h += `<div class="card"><ul style="margin:0;padding-left:18px;font-size:14px;line-height:1.7;color:var(--ink)">
    <li><strong>Rail</strong> — the fence around the outside of the ring.</li>
    <li><strong>Centerline</strong> — runs straight down the middle, end to end.</li>
    <li><strong>Quarter lines</strong> — halfway between the centerline and each rail.</li>
    <li><strong>Diagonals</strong> — corner to corner, used for diagonal lines and changes.</li></ul></div>`;
  h += `<button class="btn gold" id="goLineQuiz">🎯 Tap-the-line quiz</button>`;
  el('view-ring').innerHTML = h;
  el('goLineQuiz').addEventListener('click',renderLineQuiz);
}
const LINE_TARGETS = ['rail','centerline','quarter line','diagonal'];
function renderLineQuiz(){
  let order = LINE_TARGETS.slice(); shuffle(order);
  let idx=0, correct=0, answered=false;
  function draw(){
    let h = `<button class="back" id="bk">‹ Ring geography</button>`;
    h += `<div class="status" id="lstatus">Tap the <strong>${order[idx]}</strong></div>`;
    h += `<div class="ringwrap">${geoSVG(true)}</div>`;
    h += `<div class="scoreline">Question ${idx+1} of ${order.length} · Score ${correct}</div>`;
    el('view-ring').innerHTML = h;
    el('bk').addEventListener('click',renderRing);
    const svg = el('gsvg');
    svg.querySelectorAll('.hit').forEach(hit=>{
      hit.addEventListener('click',()=>{
        if(answered) return; answered=true;
        const name = hit.dataset.name;
        const want = order[idx];
        const ls = el('lstatus');
        if(name===want){correct++;ls.className='status ok';ls.innerHTML=`Yes! That's the ${want}. ✔`;}
        else {ls.className='status bad';ls.innerHTML=`That's the ${name}. The ${want} is the one you wanted.`;}
        setTimeout(()=>{
          idx++; answered=false;
          if(idx>=order.length){ finishLineQuiz(correct,order.length); }
          else draw();
        },1200);
      });
    });
  }
  draw();
}
function finishLineQuiz(correct,total){
  let h = `<button class="back" id="bk">‹ Ring geography</button>`;
  h += `<div class="card" style="text-align:center"><div style="font-size:40px">${correct===total?'🏆':'🐴'}</div>
    <h2 class="title" style="margin-top:6px">You got ${correct} / ${total}</h2>
    <p class="sub">${correct===total?'Perfect! You know your ring lines.':'Great practice — run it again to ace it.'}</p>
    <button class="btn gold" id="again">Try again</button></div>`;
  el('view-ring').innerHTML = h;
  el('bk').addEventListener('click',renderRing);
  el('again').addEventListener('click',renderLineQuiz);
  awardRibbon(placeByScore(correct,total),'Ring lines',`Tap-the-line quiz — ${correct}/${total}`);
}

/* ============================ TERMINOLOGY section ============================ */
let flashIdx = 0, flashOrder = [];
function renderTerms(){
  let h = `<h2 class="title">Terminology</h2><p class="sub">Flip the flashcards to learn, then test yourself.</p>`;
  h += `<div class="tabs"><button id="t-cards" class="active">🗂 Flashcards</button><button id="t-quiz">🎯 Quiz</button></div>`;
  h += `<div id="terms-body"></div>`;
  el('view-terms').innerHTML = h;
  el('t-cards').addEventListener('click',()=>{el('t-cards').classList.add('active');el('t-quiz').classList.remove('active');renderFlash();});
  el('t-quiz').addEventListener('click',()=>{el('t-quiz').classList.add('active');el('t-cards').classList.remove('active');renderTermQuiz();});
  flashOrder = TERMS.map((_,i)=>i); flashIdx=0;
  renderFlash();
}
function renderFlash(){
  const i = flashOrder[flashIdx]; const term = TERMS[i];
  let h = `<div class="counter">Card ${flashIdx+1} of ${TERMS.length}</div>`;
  h += `<div class="flash" id="flash"><div class="flash-inner">
    <div class="flash-face flash-front"><div class="term">${esc(term.t)}</div><div class="hint">tap to flip</div></div>
    <div class="flash-face flash-back"><div class="t2">${esc(term.t)}</div><div class="def">${esc(term.d)}</div></div>
  </div></div>`;
  h += `<div class="btn-row"><button class="btn ghost" id="fprev">‹ Prev</button><button class="btn ghost" id="fshuf">Shuffle</button><button class="btn" id="fnext">Next ›</button></div>`;
  el('terms-body').innerHTML = h;
  el('flash').addEventListener('click',()=>el('flash').classList.toggle('flipped'));
  el('fprev').addEventListener('click',()=>{flashIdx=(flashIdx-1+TERMS.length)%TERMS.length;renderFlash();});
  el('fnext').addEventListener('click',()=>{flashIdx=(flashIdx+1)%TERMS.length;renderFlash();});
  el('fshuf').addEventListener('click',()=>{shuffle(flashOrder);flashIdx=0;renderFlash();toast('Shuffled!');});
}
function renderTermQuiz(){
  let order = TERMS.map((_,i)=>i); shuffle(order); order=order.slice(0,10);
  let idx=0, score=0, answered=false;
  function draw(){
    const ti = order[idx]; const term = TERMS[ti];
    // options: correct term + 3 distractors
    let opts=[ti]; const pool=TERMS.map((_,i)=>i).filter(i=>i!==ti); shuffle(pool);
    opts=opts.concat(pool.slice(0,3)); shuffle(opts);
    let h = `<div class="counter">Question ${idx+1} of ${order.length} · Score ${score}</div>`;
    h += `<div class="q-prompt"><span class="tag">Which term means…</span>${esc(term.d)}</div>`;
    h += opts.map(o=>`<button class="opt" data-i="${o}">${esc(TERMS[o].t)}</button>`).join('');
    el('terms-body').innerHTML = h;
    answered=false;
    el('terms-body').querySelectorAll('.opt').forEach(btn=>{
      btn.addEventListener('click',()=>{
        if(answered) return; answered=true;
        const chosen=+btn.dataset.i;
        el('terms-body').querySelectorAll('.opt').forEach(b=>{
          b.disabled=true;
          if(+b.dataset.i===ti) b.classList.add('correct');
          else if(b===btn) b.classList.add('wrong');
        });
        if(chosen===ti) score++;
        setTimeout(()=>{ idx++; if(idx>=order.length) finishTermQuiz(score,order.length); else draw(); },1100);
      });
    });
  }
  draw();
}
function finishTermQuiz(score,total){
  let h = `<div class="card" style="text-align:center"><div style="font-size:40px">${score===total?'🏆':(score>=total*0.7?'🌟':'🐴')}</div>
    <h2 class="title" style="margin-top:6px">${score} / ${total} correct</h2>
    <p class="sub">${score===total?'Flawless — you know your terms!':'Nice work — flip through the cards and try again.'}</p>
    <button class="btn gold" id="tagain">Try again</button></div>`;
  el('terms-body').innerHTML = h;
  el('tagain').addEventListener('click',renderTermQuiz);
  awardRibbon(placeByScore(score,total),'Terminology',`Terms quiz — ${score}/${total}`);
}

/* ============================ SPATIAL section ============================ */
const UNIT_FT = 0.625; // ring interior (320 units) ≈ 200 ft
const C_RING = {x:(RING.x0+RING.x1)/2, y:(RING.y0+RING.y1)/2};

function renderSpatial(){
  let h = `<h2 class="title">Spatial Skills</h2><p class="sub">Build your sense of the ring — where you are, which way you're going, and how far a line really is.</p>`;
  h += `<div class="tabs"><button id="s-way" class="active">🧭 Which Way?</button><button id="s-stride">📏 Stride Counter</button></div>`;
  h += `<div id="spatial-body"></div>`;
  el('view-spatial').innerHTML = h;
  el('s-way').addEventListener('click',()=>{el('s-way').classList.add('active');el('s-stride').classList.remove('active');renderWhichWay();});
  el('s-stride').addEventListener('click',()=>{el('s-stride').classList.add('active');el('s-way').classList.remove('active');renderStrideCounter();});
  renderWhichWay();
}

/* Rider marker (position dot + heading arrow) */
function riderSVG(pos,heading){
  const ax=pos[0]+heading[0]*26, ay=pos[1]+heading[1]*26;
  const lx=pos[0]-heading[0]*8 - (heading[0]===0?14:0), ly=pos[1]-heading[1]*8 + (heading[1]===0? -10:0);
  return `<line x1="${pos[0]}" y1="${pos[1]}" x2="${ax}" y2="${ay}" stroke="#14402b" stroke-width="3" marker-end="url(#rar)"/>`
    + `<circle cx="${pos[0]}" cy="${pos[1]}" r="6" fill="#c0492f" stroke="#fff" stroke-width="2"/>`
    + `<text class="lbl" x="${lx}" y="${ly}" text-anchor="middle">you</text>`;
}
function makeWhichWay(){
  const rails=[
    {pos:[rand(90,270),RING.y1-6], dirs:[[1,0],[-1,0]], long:true, side:'near'},
    {pos:[rand(90,270),RING.y0+6], dirs:[[1,0],[-1,0]], long:true, side:'far'},
    {pos:[RING.x0+6,rand(70,170)], dirs:[[0,1],[0,-1]], long:false},
    {pos:[RING.x1-6,rand(70,170)], dirs:[[0,1],[0,-1]], long:false}
  ];
  const rail=rails[Math.floor(Math.random()*rails.length)];
  const heading=rail.dirs[Math.floor(Math.random()*rail.dirs.length)];
  const r=[rail.pos[0]-C_RING.x, rail.pos[1]-C_RING.y];
  const cross = r[0]*heading[1] - r[1]*heading[0];
  const trackingLeft = cross<0;
  const types=['rein','inside'];
  if(rail.long) types.push('near');
  const type=types[Math.floor(Math.random()*types.length)];
  let q,opts;
  if(type==='rein'){
    q="Which rein are you on?";
    opts=[{label:'Left rein (tracking left)',correct:trackingLeft},{label:'Right rein (tracking right)',correct:!trackingLeft}];
  }else if(type==='inside'){
    q="Which side is the inside of the ring?";
    opts=[{label:'On my left',correct:trackingLeft},{label:'On my right',correct:!trackingLeft}];
  }else{
    const near = rail.side==='near';
    q="Which rail are you next to — the near rail (by the in-gate) or the far rail?";
    opts=[{label:'Near rail (in-gate side)',correct:near},{label:'Far rail',correct:!near}];
  }
  return {pos:rail.pos,heading,q,opts:shuffle(opts.slice())};
}
function renderWhichWay(){
  let total=8, idx=0, score=0, answered=false, cur=null;
  function draw(){
    cur=makeWhichWay();
    let h = `<div class="counter">Question ${idx+1} of ${total} · Score ${score}</div>`;
    h += `<div class="ringwrap"><svg class="ring" viewBox="${VB}"><defs><marker id="rar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#14402b"/></marker></defs>`;
    h += ringFrameSVG({gate:true});
    h += riderSVG(cur.pos,cur.heading);
    h += `</svg></div>`;
    h += `<div class="q-prompt"><span class="tag">You're riding the red arrow</span>${esc(cur.q)}</div>`;
    h += cur.opts.map((o,i)=>`<button class="opt" data-i="${i}">${esc(o.label)}</button>`).join('');
    h += `<div class="status" id="wstatus" style="display:none"></div>`;
    el('spatial-body').innerHTML = h;
    answered=false;
    el('spatial-body').querySelectorAll('.opt').forEach(btn=>{
      btn.addEventListener('click',()=>{
        if(answered) return; answered=true;
        const chosen=cur.opts[+btn.dataset.i];
        el('spatial-body').querySelectorAll('.opt').forEach((b,i)=>{
          b.disabled=true;
          if(cur.opts[i].correct) b.classList.add('correct');
          else if(b===btn) b.classList.add('wrong');
        });
        const ws=el('wstatus'); ws.style.display='block';
        if(chosen.correct){score++;ws.className='status ok';ws.textContent='Yes! 🐴';}
        else {ws.className='status bad';ws.textContent='Look at the arrow — picture yourself in the saddle going that way.';}
        setTimeout(()=>{ idx++; if(idx>=total) summary(); else draw(); },1200);
      });
    });
  }
  function summary(){
    let h = `<div class="card" style="text-align:center"><div style="font-size:40px">${score===total?'🏆':(score>=6?'🌟':'🐴')}</div>
      <h2 class="title" style="margin-top:6px">${score} / ${total}</h2>
      <p class="sub">${score===total?'You always know where you are in the ring!':'Keep practicing — picture yourself riding the arrow each time.'}</p>
      <button class="btn gold" id="wagain">Ride again</button></div>`;
    el('spatial-body').innerHTML = h;
    el('wagain').addEventListener('click',renderWhichWay);
    awardRibbon(placeByScore(score,total),'Which Way?',`Which Way? — ${score}/${total}`);
  }
  draw();
}

/* Stride Counter — distance & stride feel */
function renderStrideCounter(){
  let total=6, idx=0, score=0, answered=false;
  function draw(){
    const n = 1+Math.floor(Math.random()*5); // 1..5 strides
    const ft = 12*n + 12;
    const units = ft / UNIT_FT;            // gap between jumps in svg units
    const cx=180, topY=120-units/2, botY=120+units/2;
    let options=[n-1,n,n+1,n+2].filter(v=>v>=1&&v<=7);
    options=Array.from(new Set(options)); shuffle(options);
    let h = `<div class="counter">Question ${idx+1} of ${total} · Score ${score}</div>`;
    h += `<div class="hintbar">1 canter stride ≈ 12 feet</div>`;
    h += `<div class="ringwrap"><svg class="ring" viewBox="${VB}" id="ssvg">`;
    h += ringFrameSVG({gate:true});
    h += `<g id="strideDots"></g>`;
    h += poleFor({x:cx,y:topY},[0,1]) + badge({x:cx,y:topY},1);
    h += poleFor({x:cx,y:botY},[0,1]) + badge({x:cx,y:botY},2);
    h += `</svg></div>`;
    h += `<div class="q-prompt"><span class="tag">Distance & stride feel</span>How many strides would you ride between fence 1 and fence 2?</div>`;
    h += options.map(o=>`<button class="opt" data-n="${o}">${o} stride${o===1?'':'s'}</button>`).join('');
    h += `<div class="status" id="sstatus" style="display:none"></div>`;
    el('spatial-body').innerHTML = h;
    answered=false;
    el('spatial-body').querySelectorAll('.opt').forEach(btn=>{
      btn.addEventListener('click',()=>{
        if(answered) return; answered=true;
        const chosen=+btn.dataset.n;
        el('spatial-body').querySelectorAll('.opt').forEach(b=>{
          b.disabled=true;
          if(+b.dataset.n===n) b.classList.add('correct');
          else if(b===btn) b.classList.add('wrong');
        });
        // draw the strides
        const dots=el('strideDots'); let ds='';
        const start=topY+ (units/(n+1));
        for(let k=1;k<=n;k++){ const y=topY + units*k/(n+1); ds+=`<circle cx="${cx}" cy="${y.toFixed(1)}" r="4.5" fill="#2d6a4a"/>`; }
        dots.innerHTML=ds;
        const ss=el('sstatus'); ss.style.display='block';
        if(chosen===n){score++;ss.className='status ok';ss.textContent=`Right! ${ft} ft ≈ ${n} stride${n===1?'':'s'}. See the strides drawn out.`;}
        else {ss.className='status bad';ss.textContent=`It's ${n} (about ${ft} ft). Each green dot is one canter stride.`;}
        setTimeout(()=>{ idx++; if(idx>=total) summary(); else draw(); },1700);
      });
    });
  }
  function summary(){
    let h = `<div class="card" style="text-align:center"><div style="font-size:40px">${score===total?'🏆':(score>=4?'🌟':'🐴')}</div>
      <h2 class="title" style="margin-top:6px">${score} / ${total}</h2>
      <p class="sub">${score===total?'Great eye for distance!':'Picture the 12-ft strides filling the line — you\'ll feel it.'}</p>
      <button class="btn gold" id="sagain">Try again</button></div>`;
    el('spatial-body').innerHTML = h;
    el('sagain').addEventListener('click',renderStrideCounter);
    awardRibbon(placeByScore(score,total),'Stride Counter',`Stride Counter — ${score}/${total}`);
  }
  draw();
}
function rand(a,b){return Math.round(a+Math.random()*(b-a));}

/* ============================ PATTERNS section ============================ */
function miniSVG(inner){return `<svg viewBox="0 0 240 150"><rect x="6" y="6" width="228" height="138" rx="10" fill="#eef4ee"/><rect x="6" y="6" width="228" height="138" rx="10" fill="none" stroke="#14402b" stroke-width="2.4"/>${inner}</svg>`;}
function mPole(x,y,ang){const L=12;const r=ang*Math.PI/180;const dx=Math.cos(r)*L,dy=Math.sin(r)*L;return `<line x1="${x-dx}" y1="${y-dy}" x2="${x+dx}" y2="${y+dy}" stroke="#c9a227" stroke-width="5" stroke-linecap="round"/>`;}
function mNum(x,y,n){return `<circle cx="${x}" cy="${y}" r="8" fill="#14402b"/><text x="${x}" y="${y}" fill="#fff" font-size="10" font-weight="800" text-anchor="middle" dominant-baseline="central">${n}</text>`;}
function mTrack(d){return `<path d="${d}" fill="none" stroke="#2d6a4a" stroke-width="2.4" stroke-dasharray="6 5" stroke-linecap="round" marker-end="url(#pa)"/>`;}
const PAT_DEFS = `<defs><marker id="pa" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#2d6a4a"/></marker></defs>`;
function renderPatterns(){
  const pats = [
    {n:"Outside Line", cue:"Two jumps in a straight line along the rail. Ride straight, keep an even pace, and count the same number of strides every time.",
     svg:miniSVG(PAT_DEFS+mTrack("M120 130 L120 25")+mPole(120,100,0)+mNum(105,100,1)+mPole(120,55,0)+mNum(105,55,2))},
    {n:"Diagonal Line", cue:"Two jumps set across the ring corner-to-corner. Make your turn early so you meet the first jump straight, then ride through to the second.",
     svg:miniSVG(PAT_DEFS+mTrack("M40 125 L200 35")+mPole(95,94,-29)+mNum(108,80,1)+mPole(150,64,-29)+mNum(163,50,2))},
    {n:"Single", cue:"One jump on its own. Set up early, find a straight approach, and keep your eyes up past the fence.",
     svg:miniSVG(PAT_DEFS+mTrack("M120 130 C120 90 120 90 120 40")+mPole(120,75,0)+mNum(138,75,1))},
    {n:"Bending Line", cue:"The two jumps aren't straight in line. Ride a smooth curve between them so you meet each one straight — don't cut it sharp.",
     svg:miniSVG(PAT_DEFS+mTrack("M70 130 C70 95 150 95 175 45")+mPole(70,100,0)+mNum(52,100,1)+mPole(168,62,-32)+mNum(182,50,2))},
    {n:"Opening / Closing Circle", cue:"A circle before fence 1 to set your pace, and one after the last fence to finish smoothly. Make them round and balanced.",
     svg:miniSVG(PAT_DEFS+`<circle cx="80" cy="75" r="40" fill="none" stroke="#2d6a4a" stroke-width="2.4" stroke-dasharray="6 5"/>`+mTrack("M118 70 L200 70")+mPole(170,70,90)+mNum(170,52,1)+`<text x="80" y="78" fill="#14402b" font-size="11" font-weight="700" text-anchor="middle">circle</text>`)}
  ];
  let h = `<h2 class="title">Practice Patterns</h2><p class="sub">The shapes that show up in every course. Learn the cue for each one.</p>`;
  h += pats.map(p=>`<div class="pat"><h3>${p.n}</h3>${p.svg}<div class="cue">${esc(p.cue)}</div></div>`).join('');
  el('view-patterns').innerHTML = h;
}

/* ============================ Utility ============================ */
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ============================ Ribbons ============================ */
const RIBBON_COLORS={1:'#2150d8',2:'#c33126',3:'#e6b400',4:'#f4f4f4',5:'#e85fa3',6:'#2e8b57'};
const RIBBON_DARK  ={1:'#16379a',2:'#8f231b',3:'#b08a00',4:'#d2d2d2',5:'#b23b76',6:'#1d6b40'};
const PLACE_NAME={1:'1st',2:'2nd',3:'3rd',4:'4th',5:'5th',6:'6th'};
function getRibbons(){ try{ return JSON.parse(localStorage.getItem('rr_ribbons')||'[]'); }catch(e){ return []; } }
function pleats(cx,cy,r,c,d){ let s=''; const N=16; for(let i=0;i<N;i++){ const a=i/N*2*Math.PI, x=cx+Math.cos(a)*r, y=cy+Math.sin(a)*r; s+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.3" fill="${i%2?d:c}"/>`; } return s; }
function ribbonSVG(place,size){
  size=size||40; const c=RIBBON_COLORS[place]||'#888', d=RIBBON_DARK[place]||'#555';
  const txt=(place===3||place===4)?'#3a2c00':'#fff';
  return `<svg width="${size}" height="${(size*1.4).toFixed(0)}" viewBox="0 0 40 56" aria-hidden="true">`
    + `<polygon points="20,30 14,30 11,54 19,47" fill="${d}"/><polygon points="20,30 26,30 29,54 21,47" fill="${d}"/>`
    + pleats(20,21,16,c,d)
    + `<circle cx="20" cy="21" r="13" fill="${c}"/><circle cx="20" cy="21" r="8.5" fill="#fff"/><circle cx="20" cy="21" r="7" fill="${c}"/>`
    + `<text x="20" y="21.5" text-anchor="middle" dominant-baseline="central" font-size="8" font-weight="800" fill="${txt}">${place}</text></svg>`;
}
function placeByScore(score,total){
  if(score>=total) return 1;
  if(score>=Math.floor(total*0.8)) return 2;
  if(score>=Math.floor(total*0.6)) return 3;
  return 0;
}
function updateRibbonBtn(){ const b=el('ribbonBtn'); if(b) b.innerHTML = `${ribbonSVG(1,20)}<span>${getRibbons().length}</span>`; }
function awardRibbon(place,activity,detail){
  if(!place||place<1) return;
  const list=getRibbons();
  list.push({p:place,a:activity,d:detail||'',t:Date.now()});
  if(list.length>150) list.splice(0,list.length-150);
  try{ localStorage.setItem('rr_ribbons',JSON.stringify(list)); }catch(e){}
  updateRibbonBtn();
  celebrateRibbon(place,detail||activity);
}
function celebrateRibbon(place,detail){
  const ov=document.createElement('div'); ov.className='celebrate';
  ov.innerHTML=`<div class="cel-card"><div class="rose">${ribbonSVG(place,86)}</div>
    <h2>${PLACE_NAME[place]} Place!</h2><p>${esc(detail)}</p>
    <button class="btn gold" id="celOk">Add to my ribbons 🎉</button></div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.querySelector('#celOk').addEventListener('click',close);
  ov.addEventListener('click',e=>{ if(e.target===ov) close(); });
}
function openRibbonCase(){
  const list=getRibbons(); const counts={}; list.forEach(r=>counts[r.p]=(counts[r.p]||0)+1);
  let body;
  if(!list.length){
    body=`<div class="case-empty">No ribbons yet!<br>Ace a quiz, trace a course from memory, or tap the order correctly to win your first one. 🐴</div>`;
  }else{
    let grid=''; [1,2,3,4,5,6].forEach(p=>{ if(counts[p]) grid+=`<div class="case-item">${ribbonSVG(p,52)}<div class="cnt">×${counts[p]}</div></div>`; });
    const recent=list.slice().reverse().slice(0,15).map(r=>`<div class="row">${ribbonSVG(r.p,24)}<div><b>${PLACE_NAME[r.p]} place</b> · ${esc(r.d||r.a)}</div></div>`).join('');
    body=`<div class="case-grid">${grid}</div><div class="case-total">${list.length} ribbon${list.length===1?'':'s'} won</div><div class="case-log">${recent}</div>`;
  }
  const ov=document.createElement('div'); ov.className='overlay';
  ov.innerHTML=`<div class="ob-card" style="max-width:360px">
    <h2 style="color:var(--green-dk);margin:0 0 12px">🎀 My Ribbons</h2>${body}
    <button class="btn" id="caseClose" style="margin-top:16px">Close</button></div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.querySelector('#caseClose').addEventListener('click',close);
  ov.addEventListener('click',e=>{ if(e.target===ov) close(); });
}

/* ============================ Onboarding & init ============================ */
function applyGreeting(){
  const n=getName();
  el('greet').textContent = n ? greetingFor(n) : '';
}
function greetingFor(n){
  const hour = new Date().getHours();
  const part = hour<12?'Morning':hour<17?'Afternoon':'Evening';
  return `${part}, ${n} — ready to ride?`;
}
function init(){
  const name=getName();
  if(!name){
    el('onboard').classList.remove('hidden');
  }else{
    el('onboard').classList.add('hidden');
  }
  applyGreeting();
  updateRibbonBtn();
  renderCourses();
}
el('ribbonBtn').addEventListener('click',openRibbonCase);
el('startBtn').addEventListener('click',()=>{
  const v=(el('nameInput').value||'').trim();
  if(!v){el('nameInput').focus();el('nameInput').placeholder='Please type your name';return;}
  setName(v);
  el('onboard').classList.add('hidden');
  applyGreeting();
  toast(`Welcome, ${v}! 🐴`);
});
el('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')el('startBtn').click();});

init();

/* ============================ Service worker ============================ */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
